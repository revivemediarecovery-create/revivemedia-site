<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviveMedia & Recovery | VHS to Digital & Data Rescue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 500: '#2a7f8e', 900: '#0e3a43' }, accent: { 500: '#c5a059' } }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-md shadow-sm h-20 flex items-center border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <div class="flex items-center">
                <!-- Using onerror to show placeholder in preview, real logo in production -->
                <img src="Image_c1739ec173.jpg" alt="ReviveMedia Logo" class="h-16 w-auto" 
                     onerror="this.src='https://placehold.co/150x150/0e3a43/c5a059?text=Logo'; this.classList.add('p-2', 'bg-slate-900', 'rounded-lg')">
            </div>
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="#services" class="hover:text-brand-500 transition">Services</a>
                <a href="#pricing" class="hover:text-brand-500 transition">Pricing</a>
                <button onclick="document.getElementById('contactModal').classList.remove('hidden')" class="bg-slate-900 text-white px-6 py-2 rounded-full hover:bg-slate-800">Start Project</button>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20 text-center bg-slate-900 text-white">
        <h1 class="text-5xl font-bold mb-6">Your Memories, <span class="text-teal-500">Rescued.</span></h1>
        <p class="text-xl text-slate-300 mb-10">Professional VHS to Digital & Data Recovery.</p>
    </section>

    <section id="youtube-feature" class="py-20">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h2 class="text-3xl font-bold mb-8">See Our Quality: 1997 Demo</h2>
            <div class="w-full aspect-video bg-black rounded-xl overflow-hidden shadow-2xl relative">
                <!-- YouTube Demo -->
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/Olpch-iWdzo?autoplay=1&mute=1&loop=1&playlist=Olpch-iWdzo&start=10&end=40&controls=0" allowfullscreen></iframe>
            </div>
            <a href="https://www.youtube.com/@thefamilytimemachine" target="_blank" class="inline-block mt-8 bg-red-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-red-700 transition">
                Visit Our YouTube Channel
            </a>
        </div>
    </section>

    <section id="pricing" class="py-20 bg-slate-100">
        <div class="max-w-4xl mx-auto px-4">
            <h2 class="text-4xl font-bold text-center mb-12">Quote Estimator</h2>
            <div class="bg-white p-8 rounded-2xl shadow-lg">
                <label class="block mb-4">
                    Number of Tapes:
                    <input type="number" id="tapes" value="0" class="border p-2 w-full rounded" oninput="calculateEstimate()">
                </label>
                <div id="result" class="text-2xl font-bold text-teal-700">Total Estimate: $0</div>
            </div>
        </div>
    </section>

    <footer class="bg-slate-950 py-10 text-center text-white">
        <img src="Image_c1739ec173.jpg" alt="Logo" class="h-20 w-auto mx-auto mb-4" 
             onerror="this.src='https://placehold.co/200x200/0e3a43/c5a059?text=ReviveMedia+Recovery'; this.classList.add('p-2', 'bg-white', 'rounded-lg')">
        <p>&copy; 2026 ReviveMedia & Recovery.</p>
    </footer>

    <script>
        function calculateEstimate() {
            const tapes = document.getElementById('tapes').value;
            const price = tapes >= 20 ? 15 : tapes >= 10 ? 18 : 20;
            document.getElementById('result').textContent = 'Total Estimate: $' + (tapes * price);
        }
    </script>
</body>
</html>
